steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -t
      - asia-south1-docker.pkg.dev/$PROJECT_ID/snapvault-prod/backend:$SHORT_SHA
      - .

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - asia-south1-docker.pkg.dev/$PROJECT_ID/snapvault-prod/backend:$SHORT_SHA

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - snapvault-backend-prod
      - --image=asia-south1-docker.pkg.dev/$PROJECT_ID/snapvault-prod/backend:$SHORT_SHA
      - --region=asia-south1
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --memory=1Gi
      - --cpu=1
      - --min-instances=1
      - --max-instances=20
      - --set-secrets=DB_HOST=DB_HOST_PROD:latest,DB_USER=DB_USER_PROD:latest,DB_PASSWORD=DB_PASSWORD_PROD:latest,DB_NAME=DB_NAME_PROD:latest,REDIS_URL=REDIS_URL_PROD:latest,JWT_SECRET=JWT_SECRET_PROD:latest,AWS_ACCESS_KEY_ID=AWS_ACCESS_KEY_ID_PROD:latest,AWS_SECRET_ACCESS_KEY=AWS_SECRET_ACCESS_KEY_PROD:latest,AWS_REGION=AWS_REGION_PROD:latest,S3_BUCKET=S3_BUCKET_PROD:latest,REKOGNITION_COLLECTION=REKOGNITION_COLLECTION_PROD:latest,RAZORPAY_KEY_ID=RAZORPAY_KEY_ID_PROD:latest,RAZORPAY_KEY_SECRET=RAZORPAY_KEY_SECRET_PROD:latest,RAZORPAY_WEBHOOK_SECRET=RAZORPAY_WEBHOOK_SECRET_PROD:latest,EMAIL_HOST=EMAIL_HOST_PROD:latest,EMAIL_PORT=EMAIL_PORT_PROD:latest,EMAIL_USER=EMAIL_USER_PROD:latest,EMAIL_PASS=EMAIL_PASS_PROD:latest,FIREBASE_SA_JSON=FIREBASE_SA_JSON_PROD:latest
      - --set-env-vars=NODE_ENV=production,PORT=8080

options:
  logging: CLOUD_LOGGING_ONLY
