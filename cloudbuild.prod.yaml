steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -t
      - asia-south1-docker.pkg.dev/$PROJECT_ID/snapvault-backend-prod/backend:$SHORT_SHA
      - .

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - asia-south1-docker.pkg.dev/$PROJECT_ID/snapvault-backend-prod/backend:$SHORT_SHA

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - snapvault-backend-prod
      - --image=asia-south1-docker.pkg.dev/$PROJECT_ID/snapvault-backend-prod/backend:$SHORT_SHA
      - --region=asia-south1
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=5
      - --add-cloudsql-instances=snapvault-489304:asia-south1:snapvault-dev
      - --set-secrets=DB_USER=DB_USER_DEV:latest,DB_PASS=DB_PASSWORD_DEV:latest,DB_NAME=DB_NAME_PROD:latest,REDIS_URL=REDIS_URL_DEV:latest,JWT_SECRET=JWT_SECRET_PROD:latest,AWS_ACCESS_KEY_ID=AWS_ACCESS_KEY_ID_DEV:latest,AWS_SECRET_ACCESS_KEY=AWS_SECRET_ACCESS_KEY_DEV:latest,AWS_REGION=AWS_REGION_DEV:latest,REKOGNITION_COLLECTION=REKOGNITION_COLLECTION_DEV:latest,RAZORPAY_KEY_ID=RAZORPAY_KEY_ID_PROD:latest,RAZORPAY_KEY_SECRET=RAZORPAY_KEY_SECRET_PROD:latest,RAZORPAY_WEBHOOK_SECRET=RAZORPAY_WEBHOOK_SECRET_PROD:latest,MJ_APIKEY_PUBLIC=MJ_APIKEY_PUBLIC:latest,MJ_APIKEY_SECRET=MJ_APIKEY_SECRET:latest,FIREBASE_SA_JSON=FIREBASE_SA_JSON_DEV:latest,R2_ACCOUNT_ID=R2_ACCOUNT_ID:latest,R2_ACCESS_KEY_ID=R2_ACCESS_KEY_ID:latest,R2_SECRET_ACCESS_KEY=R2_SECRET_ACCESS_KEY:latest
      - --set-env-vars=^;^NODE_ENV=production;DB_SOCKET_PATH=/cloudsql/snapvault-489304:asia-south1:snapvault-dev;ALLOWED_ORIGINS=http://localhost:3000,https://snaplivo.in;R2_BUCKET=snaplivo-photos;EMAIL_FROM_NAME=SnapLivo;EMAIL_FROM_ADDRESS=support@snaplivo.in;FRONTEND_URL=https://snaplivo.in

options:
  logging: CLOUD_LOGGING_ONLY
